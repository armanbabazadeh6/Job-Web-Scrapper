# Reject postings whose title contains any of these substrings.
# Mix of past-season tags and out-of-scope role-type tokens (back-office,
# wealth management, client-facing roles that aren't real front-office IB/PE).
reject_if_title_contains:
  # Past seasons
  - spring 2025
  - summer 2025
  - fall 2025
  - winter 2025
  - spring 2024
  - summer 2024
  - fall 2024
  - winter 2024
  # Out-of-scope finance / corporate functions
  - client relationship
  - client service
  - client services
  - client onboarding
  - private wealth
  - wealth management
  - internal audit
  - fund accounting
  - fund administration
  - back office
  - middle office
  - compliance officer
  - compliance analyst
  - tax compliance
  - tax associate
  - tax intern
  - tax advisory
  - human resources
  - paralegal


# Workday-hosted boards. Real JSON API, reliable when the tenant/site is right.
# To find values for a new company: open their careers page in a browser, copy
# the URL — first subdomain is `base` host, the path segment after the locale
# (e.g. en-US) is `site`. Example URL:
#   https://jpmc.wd5.myworkdayjobs.com/en-US/ExternalCareerSite/
#                ↑─────────── base ───────────↑    ↑── site ──↑
workday_boards:
  # Optional per-board overrides:
  #   default_role_category: assign this category if no role keyword matches.
  #     (Banks/PE firms post nearly everything in their domain — saves you
  #     having to whitelist every finance-y role keyword.)
  #   finance_titles: true: treat 'Analyst' or 'Associate' (without senior
  #     modifiers like VP/Director/Senior/Managing) as new-grad postings.
  #     Required for IB/PE because those firms don't tag titles "new grad".
  - name: Morgan Stanley
    base: https://ms.wd5.myworkdayjobs.com
    site: External
    # No default_role_category — MS is diversified (IB, wealth, ops, tech…),
    # so we require the title to match a specific keyword. finance_titles is
    # still on so explicit "Investment Banking Analyst" → new_grad.
    finance_titles: true
  - name: Blackstone
    base: https://blackstone.wd1.myworkdayjobs.com
    site: Blackstone_Careers
    default_role_category: pe
    finance_titles: true
  - name: PwC (Experienced)
    base: https://pwc.wd3.myworkdayjobs.com
    site: Global_Experienced_Careers
    default_role_category: consulting
  - name: PwC (Campus)
    base: https://pwc.wd3.myworkdayjobs.com
    site: Global_Campus_Careers
    default_role_category: consulting
    finance_titles: true
  # Note: JPMorgan, McKinsey, BCG, and KKR were tested but their Workday
  # CXS endpoints return 422 (they've gated the public API or moved
  # platforms). They remain in `watch_urls` below as a best-effort fallback.

# IB / consulting / PE / Big4 — most use Workday or custom JS-heavy portals.
# We point at their student/early-careers landing pages and grep visible links
# for matching role keywords. Coverage is best-effort: pages rendered entirely
# in JavaScript will return nothing useful; landing-page program announcements
# will be picked up.
watch_urls:
  - name: Goldman Sachs
    url: https://www.goldmansachs.com/careers/students/
  - name: JPMorgan Chase
    url: https://careers.jpmorgan.com/us/en/students/programs
  - name: Morgan Stanley
    url: https://www.morganstanley.com/people-opportunities/students-graduates
  - name: McKinsey
    url: https://www.mckinsey.com/careers
  - name: BCG
    url: https://careers.bcg.com/students
  - name: Blackstone
    url: https://www.blackstone.com/careers/students/
  - name: KKR
    url: https://www.kkr.com/careers
  - name: PwC US
    url: https://jobs.us.pwc.com/

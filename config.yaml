# IB / consulting / PE / Big4 — most use Workday or custom JS-heavy portals.
# We point at their student/early-careers landing pages and grep visible links
# for matching role keywords. Coverage is best-effort: pages rendered entirely
# in JavaScript will return nothing useful; landing-page program announcements
# will be picked up.
watch_urls:
  - name: Goldman Sachs
    url: https://www.goldmansachs.com/careers/students/

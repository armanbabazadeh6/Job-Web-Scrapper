# Posting types are checked in ORDER — first match wins. So fall/co-op needs to
# come before "internship" (otherwise a "Summer 2026 Co-op Intern" lands in
# generic internship instead of fall_coop).
posting_types:
  - key: fall_coop
    label: "🍂 Fall 2026 / Co-op"
    color: 0xE67E22
    requires_any:
      - fall 2026
      - fall '26
      - autumn 2026
      - co-op
      - coop
      - co op

  - key: new_grad
    label: "🎓 New Grad / Full-time"
    color: 0x3498DB
    requires_any:
      - new grad
      - new-grad
      - new graduate
      - graduate program
      - class of 2026
    excludes:
      - intern

  - key: internship
    label: "🌞 Internship (Summer / General)"
    color: 0x2ECC71
    requires_any:
      - intern
      - summer 2026
      - 2026 internship

# Role categories. Order = priority order in Discord output.
# A posting matches the FIRST category whose keywords appear in the title.
role_categories:
  - key: swe
    label: "💻 Software Engineering"
    keywords:
      - software engineer
      - software developer
      - swe
      - backend
      - frontend
      - front end
      - full stack
      - full-stack
      - fullstack
      - ios engineer
      - ios developer
      - android engineer
      - android developer
      - mobile engineer
      - web developer

  - key: platform
    label: "🛠️ Platform / Infra / DevOps"
    keywords:
      - platform engineer
      - infrastructure engineer
      - infra engineer
      - devops
      - sre
      - site reliability
      - cloud engineer
      - systems engineer

  - key: data
    label: "📊 Data / ML / AI"
    keywords:
      - data engineer
      - data scientist
      - data analyst
      - machine learning
      - ml engineer
      - ai engineer
      - applied scientist
      - research scientist
      - ai research

  - key: product
    label: "🧭 Product Management"
    keywords:
      - product manager
      - product management
      - apm
      - associate product
      - product analyst

  - key: tech_sales
    label: "💼 Tech Sales"
    keywords:
      - account executive
      - business development
      - bdr
      - sdr
      - sales development
      - solutions engineer
      - solutions consultant
      - sales engineer
      - sales associate
      - inside sales
      - account manager

  - key: consulting
    label: "🎯 Consulting / Strategy"
    keywords:
      - consultant
      - consulting
      - strategy analyst
      - strategy associate
      - business analyst
      - management consultant

  - key: ib
    label: "🏦 Investment Banking"
    keywords:
      - investment banking
      - investment banker
      - ib analyst
      - ib associate
      - banking analyst
      - banking associate
      - equity research
      - sales & trading
      - sales and trading
      - markets analyst
      - global markets

  - key: pe
    label: "📈 PE / VC / Buy-side"
    keywords:
      - private equity
      - growth equity
      - venture capital
      - hedge fund
      - asset management
      - investment analyst
      - investment associate

# Reject postings whose title explicitly references a past season.
reject_if_title_contains:
  - spring 2025
  - summer 2025
  - fall 2025
  - winter 2025
  - spring 2024
  - summer 2024
  - fall 2024
  - winter 2024


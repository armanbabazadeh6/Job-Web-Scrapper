# US-only filter. When true, postings whose location clearly indicates a
# non-US country/city are dropped. Empty/unknown locations are kept (lots of
# remote-US or unspecified roles fall in that bucket).
us_only: true

# Drop postings older than this many days (when the source provides a date).
# Postings with unknown posting date are kept (community lists often omit it).
# Set to 0 or remove to disable.
max_age_days: 7

# Posting types are checked in ORDER — first match wins. So fall/co-op needs to
# come before "internship" (otherwise a "Summer 2026 Co-op Intern" lands in
# generic internship instead of fall_coop).
posting_types:
  - key: fall_coop
    label: "🍂 Fall 2026 / Co-op"
    color: 0xE67E22
    requires_any:
      - fall 2026
      - fall '26
      - autumn 2026
      - co-op
      - coop
      - co op

  - key: new_grad
    label: "🎓 New Grad / Full-time"
    color: 0x3498DB
    requires_any:
      - new grad
      - new-grad
      - new graduate
      - graduate program
      - class of 2026
    excludes:
      - intern

  - key: internship
    label: "🌞 Internship (Summer / General)"
    color: 0x2ECC71
    requires_any:
      - intern
      - summer 2026
      - 2026 internship

# Role categories. Order = priority order in Discord output.
# A posting matches the FIRST category whose keywords appear in the title.
role_categories:
  - key: swe
    label: "💻 Software Engineering"
    keywords:
      - software engineer
      - software developer
      - swe
      - backend
      - frontend
      - front end

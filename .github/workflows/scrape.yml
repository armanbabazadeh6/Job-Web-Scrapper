name: Scrape jobs

on:
  schedule:
    # Every hour, at minute 17 to avoid the top-of-hour rush
    - cron: "17 * * * *"
  workflow_dispatch: {}  # allow manual run from the Actions tab

permissions:
  contents: write  # needed to commit seen.json back

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Commit updated seen.json
        run: |
          if [[ -n "$(git status --porcelain seen.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add seen.json
            git commit -m "chore: update seen.json"
            git push
          else
            echo "No changes to seen.json"
          fi
